services:
  postgres:
    image: postgres:16-alpine
    container_name: uims-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-university_inventory}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-university_inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: uims-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-university_inventory}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-UniversityInventorySuperSecretKeyChangeMeInProduction1234567890}
      SEED_ENABLED: ${SEED_ENABLED:-true}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build: ./frontend
    container_name: uims-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4200}:80"

volumes:
  pgdata:
