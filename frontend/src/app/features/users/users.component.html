<div class="page-header"><h1>Users</h1></div>

<div class="card">
  <table mat-table [dataSource]="data()">
    <ng-container matColumnDef="fullName">
      <th mat-header-cell *matHeaderCellDef>ФИО</th>
      <td mat-cell *matCellDef="let u">{{ u.fullName }}</td>
    </ng-container>
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Роль</th>
      <td mat-cell *matCellDef="let u">
        <mat-form-field appearance="outline" subscriptSizing="dynamic">
          <mat-select [value]="u.role" (selectionChange)="changeRole(u, $event.value)">
            @for (r of roles; track r) { <mat-option [value]="r">{{ r }}</mat-option> }
          </mat-select>
        </mat-form-field>
      </td>
    </ng-container>
    <ng-container matColumnDef="department">
      <th mat-header-cell *matHeaderCellDef>Подразделение</th>
      <td mat-cell *matCellDef="let u">{{ u.department || '—' }}</td>
    </ng-container>
    <ng-container matColumnDef="enabled">
      <th mat-header-cell *matHeaderCellDef>Активен</th>
      <td mat-cell *matCellDef="let u">
        <mat-slide-toggle [checked]="u.enabled"
          (change)="toggleStatus(u, $event.checked)" />
      </td>
    </ng-container>
    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns"></tr>
  </table>
  @if (data().length === 0) { <p class="muted" style="padding:16px">Нет пользователей</p> }
</div>
