spring:
  application:
    name: university-inventory

  # Default profile = dev-h2 (in-memory H2, zero setup).
  # For PostgreSQL run with profile "postgres" (see bottom of this file).
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev-h2}

  jpa:
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: false

server:
  # Render/Heroku inject the port via $PORT; fall back to SERVER_PORT, then 8080
  port: ${PORT:${SERVER_PORT:8080}}

app:
  jwt:
    secret: ${JWT_SECRET:UniversityInventorySuperSecretKeyChangeMeInProduction1234567890}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  seed:
    enabled: ${SEED_ENABLED:true}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO

---
# Default: in-memory H2, no external database needed.
spring:
  config:
    activate:
      on-profile: dev-h2
  datasource:
    url: jdbc:h2:mem:inventory;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true

---
# PostgreSQL profile: run with -Dspring.profiles.active=postgres
# (create DB "university_inventory" first; override creds via DB_* env vars)
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/university_inventory}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
